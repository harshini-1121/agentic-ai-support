<!DOCTYPE html>
<html>
<head>
<title>Agentic AI Support</title>
<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    width: 400px;
    margin: auto;
    margin-top: 50px;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
}

.chat {
    height: 300px;
    overflow-y: auto;
    margin-bottom: 10px;
}

.user { color: #38bdf8; }
.bot { color: #22c55e; }

input {
    width: 70%;
    padding: 10px;
}

button {
    padding: 10px;
    background: #38bdf8;
    border: none;
}
</style>
</head>

<body>

<div class="container">
    <h2>🤖 AI Support Assistant</h2>
    <div id="chat" class="chat"></div>

    <input id="query" placeholder="Ask your query..." />
    <button onclick="sendQuery()">Send</button>
</div>

<script>
async function sendQuery() {
    let query = document.getElementById("query").value;
    let chat = document.getElementById("chat");

    chat.innerHTML += `<div class='user'>👤 ${query}</div>`;

    const res = await fetch("http://127.0.0.1:8000/query", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ user_query: query })
    });

    const data = await res.json();

    chat.innerHTML += `<div class='bot'>🤖 ${data.response}</div>`;
}
</script>

</body>
</html>
